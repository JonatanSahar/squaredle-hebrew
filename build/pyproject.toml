[project]
name = "squaredle"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = []

[project.scripts]
squaredle-gen = "squaredle.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["squaredle"]

[tool.pytest.ini_options]
testpaths = ["tests"]
